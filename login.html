<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>OptiPrice — تسجيل الدخول</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Segoe UI',Tahoma,Arial,sans-serif;
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  direction:rtl;position:relative;overflow:hidden;
  /* خلفية فاتحة ناصعة بلمسة رمادية مريحة */
  background:#f4f7fc; 
}
.bg-logo{
  position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
  pointer-events:none;z-index:0;
}
.bg-logo img{
  width:78%;max-width:780px;
  /* زيادة الشفافية لتتناسب مع الخلفية البيضاء */
  opacity:0.04; 
  filter:blur(1px) saturate(1.2);user-select:none;
}
.bg-overlay{
  position:fixed;inset:0;z-index:1;
  /* تدرج ناعم يبرز الكارد في المنتصف */
  background:radial-gradient(ellipse 65% 75% at 50% 50%, rgba(244,247,252,0.4) 0%, rgba(244,247,252,0.9) 100%);
}
.card{
  position:relative;z-index:10;
  /* خلفية الكارد بيضاء نقية مع شفافية بسيطة */
  background:rgba(255,255,255,0.95);
  /* حدود ناعمة بلون رمادي-أزرق فاتح */
  border:1px solid rgba(55,138,221,0.15);
  border-radius:18px;padding:2.5rem 2rem;
  width:100%;max-width:420px;
  /* ظلال ناعمة جداً تناسب الستايل الفاتح الحديث */
  box-shadow:0 10px 30px rgba(10,15,30,0.06), 0 1px 3px rgba(10,15,30,0.02);
  backdrop-filter:blur(12px);
}
.card-logo{display:flex;justify-content:center;margin-bottom:0.2rem;}
/* إزالة الـ brightness لأن الخلفية أصبحت بيضاء */
.card-logo img{width:190px;} 
.tagline{text-align:center;font-size:13px;color:#5a738e;margin-bottom:1.75rem;}
.msg{border-radius:8px;padding:9px 12px;font-size:13px;margin-bottom:1rem;display:none;align-items:center;gap:8px;}
/* تعديل ألوان الرسائل لتكون واضحة ومريحة على الخلفية البيضاء */
.msg.error{background:#fdf2f2;border:1px solid #f8b4b4;color:#c81e1e;}
.msg.success{background:#f3faf7;border:1px solid #def7ec;color:#046c4e;}
.field{margin-bottom:1.2rem}
/* جعل نصوص العناوين أغمق لتسهيل القراءة */
.field label{display:block;font-size:12.5px;color:#33475b;margin-bottom:5px;font-weight:600}
.input-wrap{position:relative}
.input-wrap .fi{position:absolute;right:11px;top:50%;transform:translateY(-50%);font-size:17px;color:#7c98b6;pointer-events:none;}
.input-wrap input,.input-wrap select{
  width:100%;padding:9px 38px 9px 12px;font-size:14px;
  /* خلفية حقول الإدخال بيضاء رمادية خفيفة */
  background:#f8fafc;
  border:1px solid #cbd5e1;
  border-radius:9px;
  /* لون النص داخل الحقول داكن */
  color:#1e293b;
  outline:none;
  font-family:inherit;transition:border-color .15s,box-shadow .15s;appearance:none;
}
.input-wrap input::placeholder{color:#94a3b8}
.input-wrap input:focus,.input-wrap select:focus{
  border-color:#378ADD;box-shadow:0 0 0 3px rgba(55,138,221,0.12);
  background:#ffffff;
}
/* تعديل شكل قائمة الخيارات المسندلة للستايل الفاتح */
.input-wrap select option{background:#ffffff;color:#1e293b}
.eye-btn{position:absolute;left:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#7c98b6;padding:2px;}
.eye-btn:hover{color:#378ADD}
.row-between{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.4rem;font-size:13px}
.check-label{display:flex;align-items:center;gap:6px;color:#475569;cursor:pointer}
.check-label input{accent-color:#378ADD;width:14px;height:14px}
.forgot{color:#378ADD;text-decoration:none;font-size:13px;font-weight:500}
.forgot:hover{text-decoration:underline}
.btn-login{
  width:100%;padding:11px;
  background:linear-gradient(135deg,#1D9E75 0%,#378ADD 100%);
  color:#fff;border:none;border-radius:9px;
  font-size:15px;font-weight:600;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:8px;
  transition:opacity .15s,transform .1s;font-family:inherit;
  /* تقليل حدة توهج ظل الزر ليناسب الستايل الفاتح */
  box-shadow:0 4px 15px rgba(55,138,221,0.25);
}
.btn-login:hover{opacity:.93}
.btn-login:active{transform:scale(0.98)}
.status-row{
  display:flex;align-items:center;justify-content:center;
  gap:18px;margin-top:1.6rem;padding-top:1.25rem;
  /* خط فاصل رمادي ناعم جداً */
  border-top:1px solid #e2e8f0;
}
.sdot{display:flex;align-items:center;gap:5px;font-size:11.5px;color:#64748b}
.sdot .d{width:7px;height:7px;border-radius:50%}
/* تقليل الـ glow أو التوهج للنقاط لتبدو نظيفة ومسطحة (Flat Dynamic) */
.sdot .d.g{background:#1D9E75;box-shadow:0 0 4px rgba(29,158,117,0.4)}
.sdot .d.y{background:#EF9F27;box-shadow:0 0 4px rgba(239,159,39,0.4)}
</style>
</head>
<body>

<div class="bg-logo">
  <!-- تم تصحيح إغلاق وسم الـ img هنا -->
  <img src="photo_2026-06-09_13-20-27-removebg-preview.png" alt="الشعار"></div>
<div class="bg-overlay"></div>

<div class="card">
  <div class="card-logo">
    <!-- تم تحويل المسار النصي إلى وسم img صحيح -->
   <img src="photo_2026-06-09_13-20-27-removebg-preview.png" alt="الشعار"></div>
  <p class="tagline">منصة التسعير الديناميكي للمتاجر الجزائرية</p>

  <div class="msg error" id="errMsg">
    <i class="ti ti-alert-circle"></i>
    <span id="errText">البريد الإلكتروني أو كلمة المرور غير صحيحة.</span>
  </div>
  <div class="msg success" id="sucMsg">
    <i class="ti ti-circle-check"></i>
    <span>جاري التحويل إلى لوحة التحكم...</span>
  </div>

  <div class="field">
    <label>البريد الإلكتروني</label>
    <div class="input-wrap">
      <i class="ti ti-mail fi"></i>
      <input type="email" id="email" placeholder="ahmed@supermarche.dz" autocomplete="username"/>
    </div>
  </div>

  <div class="field">
    <label>كلمة المرور</label>
    <div class="input-wrap">
      <i class="ti ti-lock fi"></i>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>
      <button class="eye-btn" onclick="togglePass()" type="button" aria-label="إظهار/إخفاء">
        <i class="ti ti-eye" id="eyeIcon" style="font-size:17px"></i>
      </button>
    </div>
  </div>

  <div class="field">
    <label>المتجر / الوحدة</label>
    <div class="input-wrap">
      <i class="ti ti-building-store fi"></i>
      <select id="store">
        <option value="">اختر المتجر...</option>
        <option value="bab">سوبرماركت النجمة الذهبية — باب الزوار</option>
        <option value="kouba">سوبرماركت النجمة الذهبية — الكوبة</option>
        <option value="blida">فرع البليدة</option>
        <option value="setif">فرع سطيف</option>
      </select>
    </div>
  </div>

  <div class="row-between">
    <label class="check-label">
      <input type="checkbox" id="remember"/> تذكرني
    </label>
    <a href="#" class="forgot">نسيت كلمة المرور؟</a>
  </div>

  <button class="btn-login" onclick="handleLogin()">
    <i class="ti ti-login"></i>
    تسجيل الدخول
  </button>

  <div class="status-row">
    <div class="sdot"><div class="d g"></div>POS متصل</div>
    <div class="sdot"><div class="d g"></div>ESL Server متصل</div>
    <div class="sdot"><div class="d y"></div>v2.4.1</div>
  </div>
</div>

<script>
// ✅ كلمات المرور مشفرة بـ SHA-256 — لا تظهر بشكل مقروء في الكود
const USERS = [
  {
    email: "ahmed@supermarche.dz",
    hash: "5994471abb01112afcc18159f6cc74b4f511b99806da59b3caf5a9c173cacfc5"
  },
  {
    email: "admin@optiprice.dz",
    hash: "240be518fabd2724ddb6f04eeb1da5967448d7e831c08c8fa822809f74c720a9"
  }
];
const DASHBOARD = "index.html";

// دالة تشفير SHA-256 باستخدام Web Crypto API (مدمجة في المتصفح)
async function sha256(message) {
  const msgBuffer = new TextEncoder().encode(message);
  const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
}

function togglePass() {
  const i = document.getElementById('password');
  const ic = document.getElementById('eyeIcon');
  if (i.type === 'password') { i.type = 'text'; ic.className = 'ti ti-eye-off'; }
  else { i.type = 'password'; ic.className = 'ti ti-eye'; }
}

async function handleLogin() {
  const email    = document.getElementById('email').value.trim();
  const pass     = document.getElementById('password').value;
  const store    = document.getElementById('store').value;
  const remember = document.getElementById('remember').checked;
  const err = document.getElementById('errMsg');
  const suc = document.getElementById('sucMsg');
  err.style.display = 'none'; suc.style.display = 'none';

  if (!email || !pass || !store) {
    document.getElementById('errText').textContent = 'يرجى ملء جميع الحقول.';
    err.style.display = 'flex'; return;
  }

  // تشفير كلمة المرور المدخلة ومقارنتها بالهاش المخزن
  const inputHash = await sha256(pass);
  const user = USERS.find(u => u.email === email && u.hash === inputHash);

  if (user) {
    (remember ? localStorage : sessionStorage)
      .setItem('optiprice_user', JSON.stringify({ email, store }));
    suc.style.display = 'flex';
    setTimeout(() => window.location.href = DASHBOARD, 1200);
  } else {
    document.getElementById('errText').textContent = 'البريد الإلكتروني أو كلمة المرور غير صحيحة.';
    err.style.display = 'flex';
  }
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });

// تحقق تلقائي إذا كان المستخدم مسجلاً بالفعل
if (sessionStorage.getItem('optiprice_user') || localStorage.getItem('optiprice_user'))
  window.location.href = DASHBOARD;
</script>
</body>
</html>
